name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r apps/api/requirements-dev.txt
      - name: Ruff check
        run: ruff check apps/api apps/worker
      - name: Ruff format
        run: ruff format apps/api apps/worker --check
      - name: Pytest
        working-directory: apps/api
        run: pytest -q

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  compose-config:
    name: Docker Compose (config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose -f infra/docker/docker-compose.yml config --quiet

  docker-images:
    name: Docker images (build)
    runs-on: ubuntu-latest
    needs: [api, web, compose-config]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          tags: sentinel-api:ci
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: apps/worker
          push: false
          tags: sentinel-worker:ci
      - name: Build web image (runner)
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          target: runner
          push: false
          tags: sentinel-web:ci
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:30880
