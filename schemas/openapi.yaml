openapi: 3.1.0
info:
  title: Sentinel for Caido API
  version: 0.1.0
  description: |
    HTTP API contract. Default Docker Compose base URL uses host port 30880 (see infra/docker/.env.example).
    Implementation status and backlog are tracked in TASKS.md and PLAN.md; not all security controls are implemented yet.

    **Authentication:** When `SENTINEL_REQUIRE_AUTH=true` and `SENTINEL_JWT_SECRET` are set, all `/api/*` routes require `Authorization: Bearer <JWT>` (HS256).
    Claims: `sub` (string), `exp` (number), `role` (`analyst` or `admin`). When `SENTINEL_REQUIRE_AUTH` is unset or false, requests without a bearer token are accepted as an anonymous analyst (development only).

    **Rate limiting:** When `SENTINEL_RATE_LIMIT_RPM` is a positive integer, `/api/*` routes return **429** with a `Retry-After` header after too many requests from the same client in a rolling 60s window (in-process; use a gateway for multi-replica limits). `/health` and `/ready` are not limited.

    **Evidence uploads:** `POST /api/projects/{project_id}/evidence/presign` returns a presigned **PUT** URL when `S3_ENDPOINT`, `S3_BUCKET`, `S3_ACCESS_KEY`, and `S3_SECRET_KEY` are set on the API.
servers:
  - url: http://localhost:30880
    description: Docker Compose default (see infra/docker/.env.example)
  - url: http://localhost:8080
    description: Local uvicorn without Docker
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /ready:
    get:
      summary: Readiness check (database connectivity when DATABASE_URL is set)
      responses:
        '200':
          description: Ready or running without database
        '503':
          description: Database configured but unreachable
  /api/version:
    get:
      summary: API version and service name
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK (body includes writes_disabled, rate_limit_rpm)
        '429':
          description: Rate limit exceeded when SENTINEL_RATE_LIMIT_RPM is set
        '401':
          description: Missing or invalid bearer token when auth is required
        '403':
          description: Insufficient role
  /api/mcp/servers:
    get:
      summary: MCP config summary (server names and transport class only; no secrets)
      description: |
        Reads ``SENTINEL_MCP_CONFIG`` JSON (Cursor-style ``mcpServers``). Does not return commands, URLs, headers, or env.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
        '401':
          description: Missing or invalid bearer token when auth is required
        '403':
          description: Insufficient role
  /api/projects:
    get:
      summary: List projects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
        '401':
          description: Missing or invalid bearer token when auth is required
        '403':
          description: Insufficient role
    post:
      summary: Create project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Created
  /api/projects/{project_id}:
    get:
      summary: Get project by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
        '404':
          description: Not found
  /api/sync/requests:
    post:
      summary: Ingest normalized requests from Caido bridge
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestSyncPayload'
      responses:
        '202':
          description: Accepted
        '409':
          description: Scope manifest missing or invalid for the project
  /api/sync/findings:
    post:
      summary: Ingest findings from Caido bridge
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FindingSyncPayload'
      responses:
        '202':
          description: Accepted
        '409':
          description: Scope manifest missing or invalid for the project
  /api/projects/{project_id}/surface:
    get:
      summary: Get surface map
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
        '404':
          description: Project not found
  /api/projects/{project_id}/hypotheses:
    get:
      summary: List hypotheses for a project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HypothesisListResponse'
        '404':
          description: Project not found
  /api/projects/{project_id}/findings:
    get:
      summary: List findings for a project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingsListResponse'
        '404':
          description: Project not found
  /api/projects/{project_id}/evidence:
    get:
      summary: List registered evidence bundles (S3 keys / metadata)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceListResponse'
        '404':
          description: Project not found
    post:
      summary: Register evidence metadata (object stored separately in S3-compatible storage)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEvidenceRequest'
      responses:
        '201':
          description: Created
        '404':
          description: Project not found
        '409':
          description: Scope manifest missing or invalid for the project
        '422':
          description: Invalid body
  /api/projects/{project_id}/evidence/presign:
    post:
      summary: Presigned PUT URL for evidence upload (S3-compatible; server-chosen object key)
      description: |
        Returns a time-limited URL to ``PUT`` the file body. Use the same ``Content-Type`` as in the response.
        After upload, call ``POST /api/projects/{project_id}/evidence`` with the returned ``storage_key``.
        Browser uploads to MinIO/S3 may require CORS on the bucket.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidencePresignRequest'
      responses:
        '200':
          description: OK
        '404':
          description: Project not found
        '409':
          description: Scope manifest missing or invalid for the project
        '422':
          description: Invalid filename
        '503':
          description: S3 endpoint/bucket/credentials not configured on the API
  /api/hypotheses/generate:
    post:
      summary: Generate bounded hypotheses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HypothesisGenerationRequest'
      responses:
        '202':
          description: Accepted
        '409':
          description: Scope manifest missing or invalid for the project
  /api/hypotheses/{hypothesis_id}/approve:
    post:
      summary: Approve a hypothesis for execution as a bounded template
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: hypothesis_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Approved
        '404':
          description: Hypothesis not found
        '409':
          description: Scope invalid, or hypothesis not in queued state
  /api/hypotheses/{hypothesis_id}/reject:
    post:
      summary: Reject a queued hypothesis
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: hypothesis_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Rejected
        '404':
          description: Hypothesis not found
        '409':
          description: Scope invalid, or hypothesis not in queued state
  /api/feedback:
    post:
      summary: Record analyst feedback
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '201':
          description: Created
  /api/jobs:
    post:
      summary: Enqueue a worker job (Redis LPUSH JSON to the worker queue)
      description: |
        For `ingest` and `embeddings`, `project_id` is required and the project must exist with a valid scope manifest.
        Requires `REDIS_URL` on the API. Job types `noop` and `ping` do not require `project_id`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnqueueJobRequest'
      responses:
        '202':
          description: Job accepted for background processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnqueueJobResponse'
        '401':
          description: Missing or invalid bearer token when auth is required
        '403':
          description: Insufficient role
        '404':
          description: Project not found
        '409':
          description: Scope manifest missing or invalid for the project
        '422':
          description: Validation error (e.g. missing project_id for ingest/embeddings)
        '503':
          description: Redis unavailable or enqueue failed
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HS256 JWT with sub, exp, and role (analyst or admin)
  schemas:
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        owner_team:
          type: string
    RequestItem:
      type: object
      required: [caido_request_id, method, url, host, path]
      properties:
        caido_request_id:
          type: string
        method:
          type: string
        url:
          type: string
        host:
          type: string
        path:
          type: string
        status_code:
          type: integer
        req_headers_json:
          type: object
        resp_headers_json:
          type: object
    RequestSyncPayload:
      type: object
      required: [project_id, requests]
      properties:
        project_id:
          type: string
          format: uuid
        requests:
          type: array
          items:
            $ref: '#/components/schemas/RequestItem'
    FindingSyncPayload:
      type: object
      required: [project_id, findings]
      properties:
        project_id:
          type: string
          format: uuid
        findings:
          type: array
          items:
            type: object
    HypothesisGenerationRequest:
      type: object
      required: [project_id]
      properties:
        project_id:
          type: string
          format: uuid
        max_results:
          type: integer
          default: 10
    HypothesisListItem:
      type: object
      required: [id, title, bug_class, status]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        bug_class:
          type: string
        status:
          type: string
        priority_score:
          type: number
        confidence_score:
          type: number
        created_at:
          type: string
          format: date-time
        rationale:
          type: string
        supporting_evidence:
          type: array
          items: {}
        human_approval_required:
          type: boolean
        proposed_template_id:
          type: string
          format: uuid
          nullable: true
    HypothesisListResponse:
      type: object
      required: [project_id, hypotheses]
      properties:
        project_id:
          type: string
          format: uuid
        hypotheses:
          type: array
          items:
            $ref: '#/components/schemas/HypothesisListItem'
    FindingListItem:
      type: object
      required: [id, source, bug_class, status]
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        bug_class:
          type: string
        severity:
          type: string
          nullable: true
        confidence:
          type: number
          nullable: true
        status:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
    FindingsListResponse:
      type: object
      required: [project_id, findings]
      properties:
        project_id:
          type: string
          format: uuid
        findings:
          type: array
          items:
            $ref: '#/components/schemas/FindingListItem'
    FeedbackRequest:
      type: object
      required: [object_type, object_id, feedback_type, user_id]
      properties:
        object_type:
          type: string
        object_id:
          type: string
          format: uuid
        feedback_type:
          type: string
        user_id:
          type: string
        notes:
          type: string
    RegisterEvidenceRequest:
      type: object
      required: [storage_key]
      properties:
        storage_key:
          type: string
          maxLength: 1024
        summary:
          type: string
          maxLength: 4000
    EvidenceBundleItem:
      type: object
      required: [id, storage_key]
      properties:
        id:
          type: string
          format: uuid
        storage_key:
          type: string
        summary:
          type: string
        created_at:
          type: string
          format: date-time
    EvidenceListResponse:
      type: object
      required: [project_id, bundles]
      properties:
        project_id:
          type: string
          format: uuid
        bundles:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceBundleItem'
    EvidenceCreatedResponse:
      type: object
      required: [id, created]
      properties:
        created:
          type: boolean
        id:
          type: string
          format: uuid
    EvidencePresignRequest:
      type: object
      required: [filename]
      properties:
        filename:
          type: string
          maxLength: 255
        content_type:
          type: string
          maxLength: 128
    EvidencePresignResponse:
      type: object
      required: [upload_url, storage_key, expires_in, http_method, content_type]
      properties:
        upload_url:
          type: string
        storage_key:
          type: string
        expires_in:
          type: integer
          minimum: 60
        http_method:
          type: string
          enum: [PUT]
        content_type:
          type: string
    EnqueueJobRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [ingest, embeddings, ping, noop]
        project_id:
          type: string
          format: uuid
        payload:
          type: object
          additionalProperties: true
        correlation_id:
          type: string
    EnqueueJobResponse:
      type: object
      required: [job_id, queued]
      properties:
        queued:
          type: boolean
        job_id:
          type: string
          format: uuid
